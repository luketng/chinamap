<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Travel Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --panel: #1a1815;
    --panel2: #131210;
    --border: #2a2720;
    --text: #e8e0d0;
    --muted: #7a7268;
    --accent: #c9a84c;
    --hover: #1e1c17;
    --nature:   #4caf7d;
    --shopping: #e05c8a;
    --heritage: #c9a84c;
    --culture:  #7b8fe0;
    --food:     #e07b4c;
    --hotel:    #9b6ee0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Space Mono',monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  header { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; z-index:1000; flex-wrap:wrap; }
  .logo { font-family:'Noto Serif SC',serif; font-size:16px; font-weight:600; color:var(--accent); white-space:nowrap; margin-right:4px; }
  .logo span { color:var(--muted); font-size:10px; font-family:'Space Mono',monospace; margin-left:6px; }
  .legend { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:9px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); cursor:pointer; padding:3px 7px; border-radius:3px; border:1px solid transparent; transition:all .15s; white-space:nowrap; }
  .legend-item:hover,.legend-item.active { color:var(--text); border-color:var(--border); background:rgba(255,255,255,.05); }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .city-filters { display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
  .city-btn { font-size:9px; font-family:'Space Mono',monospace; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); cursor:pointer; padding:3px 8px; border-radius:3px; border:1px solid var(--border); background:transparent; transition:all .15s; white-space:nowrap; }
  .city-btn:hover,.city-btn.active { color:var(--text); background:rgba(255,255,255,.05); border-color:var(--accent); }

  /* BODY */
  .body-wrap { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  #sidebar { width:285px; flex-shrink:0; background:var(--panel2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:width .25s ease; }
  #sidebar.collapsed { width:0; min-width:0; }
  #sidebar.collapsed .sidebar-search,
  #sidebar.collapsed .sidebar-list,
  #sidebar.collapsed .sidebar-footer { opacity:0; pointer-events:none; }
  #sidebar-toggle { flex-shrink:0; width:18px; background:var(--panel2); border:none; border-right:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; line-height:1; transition:color .15s, background .15s; user-select:none; padding:0; }
  #sidebar-toggle:hover { color:var(--text); background:var(--hover); }
  .sidebar-search { padding:9px 11px; border-bottom:1px solid var(--border); flex-shrink:0; transition:opacity .2s; }
  .sidebar-search input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:'Space Mono',monospace; font-size:10px; padding:5px 9px; outline:none; transition:border-color .2s; }
  .sidebar-search input::placeholder { color:var(--muted); }
  .sidebar-search input:focus { border-color:var(--accent); }
  .sidebar-list { flex:1; overflow-y:auto; padding:3px 0 8px; transition:opacity .2s; }
  .sidebar-list::-webkit-scrollbar { width:3px; }
  .sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* City section headers */
  .city-header { display:flex; align-items:center; gap:8px; padding:12px 11px 5px; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); font-family:'Noto Serif SC',serif; position:sticky; top:0; background:var(--panel2); z-index:3; border-bottom:1px solid var(--border); }
  .city-header-count { margin-left:auto; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

  /* Category group headers */
  .group-header { display:flex; align-items:center; gap:6px; padding:8px 11px 3px; font-size:8.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); font-weight:700; position:sticky; top:32px; background:var(--panel2); z-index:2; }
  .group-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .group-count { margin-left:auto; color:var(--border); font-size:8.5px; }

  .place-row { display:flex; align-items:flex-start; gap:7px; padding:5px 11px; cursor:pointer; border-left:2px solid transparent; transition:background .12s, border-color .12s; }
  .place-row:hover { background:var(--hover); }
  .place-row.active-row { background:var(--hover); }
  .place-row-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:4px; }
  .place-row-name { font-size:10.5px; color:var(--text); line-height:1.35; }
  .place-row-loc { font-size:8.5px; color:var(--muted); margin-top:1px; line-height:1.3; }
  .place-row.sb-hidden,.group-header.sb-hidden,.city-header.sb-hidden { display:none; }

  .sidebar-footer { padding:7px 11px; border-top:1px solid var(--border); font-size:9px; color:var(--muted); flex-shrink:0; transition:opacity .2s; }
  .sidebar-footer strong { color:var(--text); }

  /* MAP */
  #map { flex:1; }

  /* POPUPS */
  .leaflet-popup-content-wrapper { background:var(--panel)!important; border:1px solid var(--border)!important; border-radius:4px!important; box-shadow:0 8px 32px rgba(0,0,0,.65)!important; color:var(--text)!important; font-family:'Space Mono',monospace!important; }
  .leaflet-popup-tip { background:var(--panel)!important; }
  .leaflet-popup-content { margin:12px 14px!important; min-width:170px; }
  .popup-city { font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
  .popup-cat { font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:4px; font-weight:700; }
  .popup-name { font-family:'Noto Serif SC',serif; font-size:13px; font-weight:600; line-height:1.3; margin-bottom:4px; }
  .popup-loc { font-size:9.5px; color:var(--muted); line-height:1.35; }
  .popup-tip { font-size:9px; color:#a09580; line-height:1.4; margin-top:5px; padding-top:5px; border-top:1px solid var(--border); font-style:italic; }
  .leaflet-control-attribution { background:rgba(15,14,12,.8)!important; color:var(--muted)!important; font-size:8px!important; }
  .leaflet-control-attribution a { color:var(--accent)!important; }
</style>
</head>
<body>

<header>
  <div class="logo">中国旅行地图 <span>// CHINA TRAVEL MAP</span></div>
  <div class="legend" id="legend">
    <div class="legend-item active" data-cat="all"><div class="legend-dot" style="background:var(--text)"></div>All</div>
    <div class="legend-item" data-cat="nature"><div class="legend-dot" style="background:var(--nature)"></div>Nature</div>
    <div class="legend-item" data-cat="shopping"><div class="legend-dot" style="background:var(--shopping)"></div>Shopping</div>

    <div class="legend-item" data-cat="culture"><div class="legend-dot" style="background:var(--culture)"></div>Culture</div>
    <div class="legend-item" data-cat="food"><div class="legend-dot" style="background:var(--food)"></div>Food</div>
    <div class="legend-item" data-cat="hotel"><div class="legend-dot" style="background:var(--hotel)"></div>Hotels</div>
  </div>
  <div class="city-filters" id="city-filters">
    <button class="city-btn active" data-city="all">All Cities</button>
    <button class="city-btn" data-city="Beijing">Beijing</button>
    <button class="city-btn" data-city="Shanghai">Shanghai</button>
    <button class="city-btn" data-city="Nanjing">Nanjing</button>
    <button class="city-btn" data-city="Suzhou">Suzhou</button>
    <button class="city-btn" data-city="Hangzhou">Hangzhou</button>
  </div>
</header>

<div class="body-wrap">
  <div id="sidebar">
    <div class="sidebar-search"><input id="search" type="text" placeholder="Search locations…" autocomplete="off"></div>
    <div class="sidebar-list" id="list"></div>
    <div class="sidebar-footer">Showing <strong id="count">0</strong> locations</div>
  </div>
  <button id="sidebar-toggle" title="Collapse sidebar">&#x276E;</button>
  <div id="map"></div>
</div>

];

// De-dup
const seen=new Set(), PLACES=DATA.filter(p=>{ if(seen.has(p.city+p.name))return false; seen.add(p.city+p.name); return true; });
const CITIES=['Beijing','Shanghai','Nanjing','Suzhou','Hangzhou'];
const CITY_CENTERS = { Beijing:[39.9042,116.4074], Shanghai:[31.2304,121.4737], Nanjing:[32.0603,118.7969], Suzhou:[31.2989,120.5853], Hangzhou:[30.2741,120.1551] };

// MAP
const map=L.map('map',{center:[32.5,119.5],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

function mkIcon(cat){
  const col=C[cat];
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32"><path d="M12 0C5.37 0 0 5.37 0 12c0 8 12 20 12 20S24 20 24 12C24 5.37 18.63 0 12 0z" fill="${col}"/><circle cx="12" cy="12" r="5.5" fill="rgba(0,0,0,.3)"/><text x="12" y="16" text-anchor="middle" font-size="7" fill="white" font-family="monospace" font-weight="bold">${cat.slice(0,2).toUpperCase()}</text></svg>`,
    className:'',iconSize:[24,32],iconAnchor:[12,32],popupAnchor:[0,-34]
  });
}

const markers=[], rowEls=[];
let activeRowIdx=null;

PLACES.forEach((p,i)=>{
  const m=L.marker([p.lat,p.lng],{icon:mkIcon(p.cat)});
  const tipHtml = p.tip ? `<div class="popup-tip">${p.tip}</div>` : '';
  m.bindPopup(`<div class="popup-city">${p.city}</div><div class="popup-cat" style="color:${C[p.cat]}">${IC[p.cat]} ${p.cat.toUpperCase()}</div><div class="popup-name">${p.name}</div><div class="popup-loc">${p.loc}</div>${tipHtml}`,{maxWidth:280});
  m.addTo(map);
  m._cat=p.cat; m._city=p.city; m._idx=i;
  m.on('click',()=>{ activateRow(i); scrollRow(i); });
  markers.push(m);
});

// BUILD SIDEBAR
const listEl=document.getElementById('list');

CITIES.forEach(city=>{
  const cityPlaces=PLACES.filter(p=>p.city===city);
  if(!cityPlaces.length)return;

  const ch=document.createElement('div');
  ch.className='city-header'; ch.dataset.city=city;
  ch.innerHTML=`${city}<span class="city-header-count">${cityPlaces.length}</span>`;
  listEl.appendChild(ch);

  CAT_ORDER.forEach(cat=>{
    const grp=cityPlaces.filter(p=>p.cat===cat);
    if(!grp.length)return;

    const gh=document.createElement('div');
    gh.className='group-header'; gh.dataset.cat=cat; gh.dataset.city=city;
    gh.innerHTML=`<div class="group-dot" style="background:${C[cat]}"></div>${IC[cat]} ${cat.charAt(0).toUpperCase()+cat.slice(1)}<span class="group-count">${grp.length}</span>`;
    listEl.appendChild(gh);

    grp.forEach(p=>{
      const i=PLACES.indexOf(p);
      const row=document.createElement('div');
      row.className='place-row';
      row.dataset.cat=p.cat; row.dataset.city=p.city; row.dataset.idx=i;
      row.dataset.search=p.name.toLowerCase()+' '+p.loc.toLowerCase()+' '+(p.tip||'').toLowerCase();
      row.innerHTML=`<div class="place-row-dot" style="background:${C[p.cat]}"></div><div><div class="place-row-name">${p.name}</div><div class="place-row-loc">${p.loc}</div></div>`;
      row.addEventListener('click',()=>{
        map.flyTo([p.lat,p.lng],14,{duration:0.75});
        setTimeout(()=>markers[i].openPopup(),800);
        activateRow(i);
      });
      listEl.appendChild(row);
      rowEls[i]=row;
    });
  });
});

function activateRow(i){
  if(activeRowIdx!==null&&rowEls[activeRowIdx]){
    rowEls[activeRowIdx].classList.remove('active-row');
    rowEls[activeRowIdx].style.borderLeftColor='transparent';
  }
  activeRowIdx=i;
  if(rowEls[i]){
    rowEls[i].classList.add('active-row');
    rowEls[i].style.borderLeftColor=C[PLACES[i].cat];
  }
}
function scrollRow(i){ if(rowEls[i]) rowEls[i].scrollIntoView({behavior:'smooth',block:'nearest'}); }

// FILTER STATE
let activeCat='all', activeCity='all', searchQ='';

function applyFilters(){
  let n=0;
  markers.forEach(m=>{
    const show=(activeCat==='all'||m._cat===activeCat)&&(activeCity==='all'||m._city===activeCity);
    show?m.addTo(map):map.removeLayer(m);
    if(show)n++;
  });
  document.querySelectorAll('.place-row').forEach(r=>{
    const catOk=activeCat==='all'||r.dataset.cat===activeCat;
    const cityOk=activeCity==='all'||r.dataset.city===activeCity;
    const srchOk=!searchQ||r.dataset.search.includes(searchQ);
    r.classList.toggle('sb-hidden',!(catOk&&cityOk&&srchOk));
  });
  document.querySelectorAll('.group-header').forEach(h=>{
    const catOk=activeCat==='all'||h.dataset.cat===activeCat;
    const cityOk=activeCity==='all'||h.dataset.city===activeCity;
    if(!catOk||!cityOk){h.classList.add('sb-hidden');return;}
    const any=[...document.querySelectorAll(`.place-row[data-cat="${h.dataset.cat}"][data-city="${h.dataset.city}"]`)].some(r=>!r.classList.contains('sb-hidden'));
    h.classList.toggle('sb-hidden',!any);
  });
  document.querySelectorAll('.city-header').forEach(h=>{
    const cityOk=activeCity==='all'||h.dataset.city===activeCity;
    if(!cityOk){h.classList.add('sb-hidden');return;}
    const any=[...document.querySelectorAll(`.place-row[data-city="${h.dataset.city}"]`)].some(r=>!r.classList.contains('sb-hidden'));
    h.classList.toggle('sb-hidden',!any);
  });

  // recount visible sidebar rows
  const visible=[...document.querySelectorAll('.place-row')].filter(r=>!r.classList.contains('sb-hidden')).length;
  document.getElementById('count').textContent=visible;
}

// Legend (category filter)
document.querySelectorAll('.legend-item').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.legend-item').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    activeCat=el.dataset.cat;
    applyFilters();
  });
});

// City filter
document.querySelectorAll('.city-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.city-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    activeCity=btn.dataset.city;
    if(activeCity!=='all') map.flyTo(CITY_CENTERS[activeCity],12,{duration:0.9});
    else map.flyTo([32.5,119.5],6,{duration:0.9});
    applyFilters();
  });
});

// Search
document.getElementById('search').addEventListener('input',function(){
  searchQ=this.value.toLowerCase().trim();
  applyFilters();
});

// Sidebar toggle
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebar-toggle');
let sidebarOpen = true;
toggleBtn.addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggleBtn.innerHTML = sidebarOpen ? '&#x276E;' : '&#x276F;';
  toggleBtn.title = sidebarOpen ? 'Collapse sidebar' : 'Expand sidebar';
  setTimeout(() => map.invalidateSize(), 260);
});

applyFilters();
</script>
