<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Travel Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f3ef;
    --panel:    #ffffff;
    --panel2:   #fafaf8;
    --border:   #e2ddd6;
    --text:     #2c2820;
    --muted:    #8c8075;
    --accent:   #b8891e;
    --hover:    #f0ece4;
    --active:   #e8e0d0;
    --nature:   #2e9e5b;
    --shopping: #c94070;
    --heritage: #b8891e;
    --culture:  #4a5fc4;
    --food:     #c45a20;
    --hotel:    #7b44c4;
    --shadow:   0 2px 12px rgba(0,0,0,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  header { display:flex; align-items:center; gap:10px; padding:9px 16px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; z-index:1000; flex-wrap:wrap; box-shadow:var(--shadow); }
  .logo { font-family:'Noto Serif SC',serif; font-size:15px; font-weight:600; color:var(--accent); white-space:nowrap; }
  .logo span { color:var(--muted); font-size:10px; font-family:'Inter',sans-serif; margin-left:8px; font-weight:400; }
  .legend { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:500; color:var(--muted); cursor:pointer; padding:4px 8px; border-radius:20px; border:1.5px solid transparent; transition:all .15s; white-space:nowrap; }
  .legend-item:hover { background:var(--hover); color:var(--text); }
  .legend-item.active { color:var(--text); border-color:currentColor; background:var(--hover); }
  .legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .city-filters { display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
  .city-btn { font-size:10px; font-family:'Inter',sans-serif; font-weight:500; color:var(--muted); cursor:pointer; padding:4px 10px; border-radius:20px; border:1.5px solid var(--border); background:transparent; transition:all .15s; white-space:nowrap; }
  .city-btn:hover { background:var(--hover); color:var(--text); }
  .city-btn.active { color:var(--accent); border-color:var(--accent); background:#fdf6e7; }

  /* BODY */
  .body-wrap { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  #sidebar { width:290px; flex-shrink:0; background:var(--panel2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:width .25s ease; }
  #sidebar.collapsed { width:0; min-width:0; }
  #sidebar.collapsed .sidebar-search,
  #sidebar.collapsed .sidebar-list,
  #sidebar.collapsed .sidebar-footer { opacity:0; pointer-events:none; }

  /* TOGGLE BUTTON — sibling of sidebar, always visible */
  #sidebar-toggle { flex-shrink:0; width:20px; background:var(--panel2); border:none; border-right:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; line-height:1; transition:color .15s, background .15s; padding:0; }
  #sidebar-toggle:hover { color:var(--text); background:var(--hover); }

  .sidebar-search { padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; transition:opacity .2s; }
  .sidebar-search input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:'Inter',sans-serif; font-size:11px; padding:6px 10px; outline:none; transition:border-color .2s; }
  .sidebar-search input::placeholder { color:var(--muted); }
  .sidebar-search input:focus { border-color:var(--accent); }
  .sidebar-list { flex:1; overflow-y:auto; padding:4px 0 8px; transition:opacity .2s; }
  .sidebar-list::-webkit-scrollbar { width:4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .city-header { display:flex; align-items:center; gap:8px; padding:12px 12px 5px; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); font-family:'Noto Serif SC',serif; position:sticky; top:0; background:var(--panel2); z-index:3; border-bottom:1px solid var(--border); }
  .city-header-count { margin-left:auto; font-family:'Inter',sans-serif; font-size:9px; font-weight:400; color:var(--muted); }

  .group-header { display:flex; align-items:center; gap:6px; padding:8px 12px 3px; font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); position:sticky; top:33px; background:var(--panel2); z-index:2; }
  .group-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .group-count { margin-left:auto; color:var(--border); font-size:9px; }

  .place-row { display:flex; align-items:flex-start; gap:8px; padding:6px 12px; cursor:pointer; border-left:3px solid transparent; transition:background .12s, border-color .12s; }
  .place-row:hover { background:var(--hover); }
  .place-row.active-row { background:var(--active); }
  .place-row-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:4px; }
  .place-row-name { font-size:11px; font-weight:500; color:var(--text); line-height:1.35; }
  .place-row-loc { font-size:9px; color:var(--muted); margin-top:1px; line-height:1.3; }
  .place-row.sb-hidden,.group-header.sb-hidden,.city-header.sb-hidden { display:none; }

  .sidebar-footer { padding:7px 12px; border-top:1px solid var(--border); font-size:10px; color:var(--muted); flex-shrink:0; transition:opacity .2s; }
  .sidebar-footer strong { color:var(--text); }

  /* MAP */
  #map { flex:1; }

  /* POPUPS */
  .leaflet-popup-content-wrapper { background:var(--panel)!important; border:1px solid var(--border)!important; border-radius:8px!important; box-shadow:0 8px 32px rgba(0,0,0,.15)!important; color:var(--text)!important; font-family:'Inter',sans-serif!important; }
  .leaflet-popup-tip { background:var(--panel)!important; }
  .leaflet-popup-content { margin:13px 15px!important; min-width:180px; }
  .popup-city { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; font-weight:500; }
  .popup-cat { font-size:9px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:5px; font-weight:700; }
  .popup-name { font-family:'Noto Serif SC',serif; font-size:14px; font-weight:600; line-height:1.3; margin-bottom:4px; color:var(--text); }
  .popup-loc { font-size:10px; color:var(--muted); line-height:1.35; }
  .popup-tip { font-size:10px; color:#5a5040; line-height:1.45; margin-top:7px; padding-top:7px; border-top:1px solid var(--border); }
  .leaflet-control-attribution { background:rgba(255,255,255,0.85)!important; color:var(--muted)!important; font-size:9px!important; }
  .leaflet-control-attribution a { color:var(--accent)!important; }

  /* LOCATE BUTTON */
  #locate-btn { display:flex; align-items:center; gap:6px; font-size:10px; font-family:'Inter',sans-serif; font-weight:500; color:var(--muted); cursor:pointer; padding:4px 10px; border-radius:20px; border:1.5px solid var(--border); background:transparent; transition:all .2s; white-space:nowrap; flex-shrink:0; }
  #locate-btn:hover { background:var(--hover); color:var(--text); border-color:var(--accent); }
  #locate-btn.locating { color:var(--accent); border-color:var(--accent); background:#fdf6e7; }
  #locate-btn.located  { color:#2e9e5b; border-color:#2e9e5b; background:#edf7f2; }
  #locate-btn.error    { color:#c45a20; border-color:#c45a20; background:#fdf2ec; }
  .locate-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .locate-dot.pulse { background:#2e9e5b; animation:pulse 1.6s ease-out infinite; }
  .locate-dot.idle  { background:var(--muted); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(46,158,91,.55)} 70%{box-shadow:0 0 0 8px rgba(46,158,91,0)} 100%{box-shadow:0 0 0 0 rgba(46,158,91,0)} }
</style>
</head>
<body>

<header>
  <div class="logo">中国旅行地图 <span>CHINA TRAVEL MAP</span></div>
  <div class="legend" id="legend">
    <div class="legend-item active" data-cat="all"><div class="legend-dot" style="background:#888"></div>All</div>

  </div>
  <div class="city-filters">
    <button class="city-btn active" data-city="all">All Cities</button>
    <button class="city-btn" data-city="Beijing">Beijing</button>
    <button class="city-btn" data-city="Shanghai">Shanghai</button>
    <button class="city-btn" data-city="Nanjing">Nanjing</button>
    <button class="city-btn" data-city="Suzhou">Suzhou</button>
    <button class="city-btn" data-city="Hangzhou">Hangzhou</button>
  </div>
  <button id="locate-btn" title="Show my location">
    <div class="locate-dot idle"></div>
    <span id="locate-label">My Location</span>
  </button>
</header>

<div class="body-wrap">
  <div id="sidebar">
    <div class="sidebar-search"><input id="search" type="text" placeholder="🔍  Search locations…" autocomplete="off"></div>
    <div class="sidebar-list" id="list"></div>
    <div class="sidebar-footer">Showing <strong id="count">0</strong> locations</div>
  </div>
  <button id="sidebar-toggle" title="Collapse sidebar">&#x276E;</button>
  <div id="map"></div>
</div>

const CITIES=['Beijing','Shanghai','Nanjing','Suzhou','Hangzhou'];
const CITY_CENTERS={ Beijing:[39.9042,116.4074], Shanghai:[31.2304,121.4737], Nanjing:[32.0603,118.7969], Suzhou:[31.2989,120.5853], Hangzhou:[30.2741,120.1551] };

// MAP — light Carto Positron
const map=L.map('map',{center:[32.5,119.5],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

function mkIcon(cat){
  const col=C[cat];
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.25"/></filter>
      <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 22 14 22S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="${col}" filter="url(#s)"/>
      <circle cx="14" cy="13" r="7" fill="white" opacity="0.9"/>
      <circle cx="14" cy="13" r="5" fill="${col}"/>
    </svg>`,
    className:'', iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-38]
  });
}

const markers=[], rowEls=[];
let activeRowIdx=null;

PLACES.forEach((p,i)=>{
  const m=L.marker([p.lat,p.lng],{icon:mkIcon(p.cat)});
  const tipHtml=p.tip?`<div class="popup-tip">${p.tip}</div>`:'';
  m.bindPopup(`<div class="popup-city">${p.city}</div><div class="popup-cat" style="color:${C[p.cat]}">${IC[p.cat]} ${p.cat.toUpperCase()}</div><div class="popup-name">${p.name}</div><div class="popup-loc">${p.loc}</div>${tipHtml}`,{maxWidth:280});
  m.addTo(map);
  m._cat=p.cat; m._city=p.city; m._idx=i;
  m.on('click',()=>{ activateRow(i); scrollRow(i); });
  markers.push(m);
});

// SIDEBAR BUILD
const listEl=document.getElementById('list');
CITIES.forEach(city=>{
  const cityPlaces=PLACES.filter(p=>p.city===city);
  if(!cityPlaces.length)return;
  const ch=document.createElement('div');
  ch.className='city-header'; ch.dataset.city=city;
  ch.innerHTML=`${city}<span class="city-header-count">${cityPlaces.length} places</span>`;
  listEl.appendChild(ch);
  CAT_ORDER.forEach(cat=>{
    const grp=cityPlaces.filter(p=>p.cat===cat);
    if(!grp.length)return;
    const gh=document.createElement('div');
    gh.className='group-header'; gh.dataset.cat=cat; gh.dataset.city=city;
    gh.innerHTML=`<div class="group-dot" style="background:${C[cat]}"></div>${IC[cat]} ${cat.charAt(0).toUpperCase()+cat.slice(1)}<span class="group-count">${grp.length}</span>`;
    listEl.appendChild(gh);
    grp.forEach(p=>{
      const i=PLACES.indexOf(p);
      const row=document.createElement('div');
      row.className='place-row';
      row.dataset.cat=p.cat; row.dataset.city=p.city; row.dataset.idx=i;
      row.dataset.search=p.name.toLowerCase()+' '+p.loc.toLowerCase()+' '+(p.tip||'').toLowerCase();
      row.innerHTML=`<div class="place-row-dot" style="background:${C[p.cat]}"></div><div><div class="place-row-name">${p.name}</div><div class="place-row-loc">${p.loc}</div></div>`;
      row.addEventListener('click',()=>{
        map.flyTo([p.lat,p.lng],15,{duration:0.8});
        setTimeout(()=>markers[i].openPopup(),850);
        activateRow(i);
      });
      listEl.appendChild(row);
      rowEls[i]=row;
    });
  });
});

function activateRow(i){
  if(activeRowIdx!==null&&rowEls[activeRowIdx]){
    rowEls[activeRowIdx].classList.remove('active-row');
    rowEls[activeRowIdx].style.borderLeftColor='transparent';
  }
  activeRowIdx=i;
  if(rowEls[i]){
    rowEls[i].classList.add('active-row');
    rowEls[i].style.borderLeftColor=C[PLACES[i].cat];
  }
}
function scrollRow(i){ if(rowEls[i]) rowEls[i].scrollIntoView({behavior:'smooth',block:'nearest'}); }

let activeCat='all', activeCity='all', searchQ='';

function applyFilters(){
  markers.forEach(m=>{
    const show=(activeCat==='all'||m._cat===activeCat)&&(activeCity==='all'||m._city===activeCity);
    show?m.addTo(map):map.removeLayer(m);
  });
  document.querySelectorAll('.place-row').forEach(r=>{
    const ok=(activeCat==='all'||r.dataset.cat===activeCat)&&(activeCity==='all'||r.dataset.city===activeCity)&&(!searchQ||r.dataset.search.includes(searchQ));
    r.classList.toggle('sb-hidden',!ok);
  });
  document.querySelectorAll('.group-header').forEach(h=>{
    const catOk=activeCat==='all'||h.dataset.cat===activeCat;
    const cityOk=activeCity==='all'||h.dataset.city===activeCity;
    if(!catOk||!cityOk){h.classList.add('sb-hidden');return;}
    const any=[...document.querySelectorAll(`.place-row[data-cat="${h.dataset.cat}"][data-city="${h.dataset.city}"]`)].some(r=>!r.classList.contains('sb-hidden'));
    h.classList.toggle('sb-hidden',!any);
  });
  document.querySelectorAll('.city-header').forEach(h=>{
    const cityOk=activeCity==='all'||h.dataset.city===activeCity;
    if(!cityOk){h.classList.add('sb-hidden');return;}
    const any=[...document.querySelectorAll(`.place-row[data-city="${h.dataset.city}"]`)].some(r=>!r.classList.contains('sb-hidden'));
    h.classList.toggle('sb-hidden',!any);
  });
  const visible=[...document.querySelectorAll('.place-row')].filter(r=>!r.classList.contains('sb-hidden')).length;
  document.getElementById('count').textContent=visible;
}

document.querySelectorAll('.legend-item').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.legend-item').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    activeCat=el.dataset.cat;
    applyFilters();
  });
});
document.querySelectorAll('.city-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.city-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    activeCity=btn.dataset.city;
    if(activeCity!=='all') map.flyTo(CITY_CENTERS[activeCity],13,{duration:0.9});
    else map.flyTo([32.5,119.5],6,{duration:0.9});
    applyFilters();
  });
});
document.getElementById('search').addEventListener('input',function(){
  searchQ=this.value.toLowerCase().trim();
  applyFilters();
});

const locBtn    = document.getElementById('locate-btn');
const locLabel  = document.getElementById('locate-label');
const locDot    = locBtn.querySelector('.locate-dot');
let locationMarker = null;
let locationCircle = null;
let watchId = null;
let isTracking = false;

function setLocState(state, text) {
  locBtn.className = '';
  locDot.className = 'locate-dot';
  if (state === 'locating') { locBtn.classList.add('locating'); locDot.classList.add('pulse'); }
  if (state === 'located')  { locBtn.classList.add('located');  locDot.classList.add('pulse'); }
  if (state === 'error')    { locBtn.classList.add('error');     locDot.classList.add('idle'); }
  if (state === 'idle')     { locDot.classList.add('idle'); }
  locLabel.textContent = text;
}

function updateLocationOnMap(lat, lng, accuracy) {
  const latlng = [lat, lng];
  if (!locationMarker) {
    // Custom "you are here" dot marker
    const youIcon = L.divIcon({
      html: `<div style="
        width:16px; height:16px; border-radius:50%;
        background:#2e9e5b; border:3px solid white;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
        animation:pulse 1.6s ease-out infinite;
      "></div>`,
      className: '', iconSize:[16,16], iconAnchor:[8,8], popupAnchor:[0,-12]
    });
    locationMarker = L.marker(latlng, { icon: youIcon, zIndexOffset: 1000 })
      .bindPopup(`<div style="font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#2e9e5b;">📍 You are here</div><div style="font-size:10px;color:#8c8075;margin-top:3px;">Accuracy: ±${Math.round(accuracy)}m</div>`)
      .addTo(map);
    locationCircle = L.circle(latlng, {
      radius: accuracy,
      color: '#2e9e5b', fillColor: '#2e9e5b',
      fillOpacity: 0.08, weight: 1.5, dashArray: '4 4'
    }).addTo(map);
  } else {
    locationMarker.setLatLng(latlng);
    locationCircle.setLatLng(latlng).setRadius(accuracy);
    locationMarker.getPopup().setContent(
      `<div style="font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#2e9e5b;">📍 You are here</div><div style="font-size:10px;color:#8c8075;margin-top:3px;">Accuracy: ±${Math.round(accuracy)}m</div>`
    );
  }
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (locationMarker)   { map.removeLayer(locationMarker); locationMarker = null; }
  if (locationCircle)   { map.removeLayer(locationCircle); locationCircle = null; }
  isTracking = false;
  setLocState('idle', 'My Location');
}

locBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    setLocState('error', 'Not supported');
    return;
  }
  if (isTracking) { stopTracking(); return; }

  isTracking = true;
  setLocState('locating', 'Locating…');

  // Get initial fix and fly to it
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      updateLocationOnMap(lat, lng, accuracy);
      map.flyTo([lat, lng], 14, { duration: 1 });
      setLocState('located', 'Tracking on');

      // Then watch for updates
      watchId = navigator.geolocation.watchPosition(
        (p) => updateLocationOnMap(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
        () => {}, // silent watch errors
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    },
    (err) => {
      isTracking = false;
      const msgs = { 1:'Permission denied', 2:'Position unavailable', 3:'Timed out' };
      setLocState('error', msgs[err.code] || 'Location error');
      setTimeout(() => setLocState('idle', 'My Location'), 3000);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
});
</script>
</body>
</html>
